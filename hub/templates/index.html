<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="tool-nav">
    <a href="/" class="tool-nav-link active">Home</a>
    {% for t in tools %}
    <a href="{{ t.prefix }}/" class="tool-nav-link">{{ t.title }}</a>
    {% endfor %}
  </nav>

  <header class="masthead">
    <p class="eyebrow">github.com/Azeret6/tools</p>
    <h1>Tools</h1>
    <p class="subtitle">Practical calculators. Pick one below.</p>
  </header>

  <main class="grid">
    {% for tool in tools %}
    <a class="card" href="{{ tool.prefix }}/">
      <p class="card-title">{{ tool.title }}</p>
      <p class="card-description">{{ tool.description }}</p>
      <span class="card-arrow">Open &rarr;</span>
    </a>
    {% endfor %}
  </main>

</body>
</html>
